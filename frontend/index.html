<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VidScrutiny | AI Fact-Checker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="styles.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-[#0b0c10] text-white h-screen overflow-hidden flex flex-col selection:bg-blue-500/30 relative">
    <!-- Decorative Background Globs -->
    <div class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] bg-blue-600/20 rounded-full blur-[120px] pointer-events-none"></div>
    <div class="absolute bottom-[-10%] right-[-10%] w-[40%] h-[40%] bg-emerald-600/10 rounded-full blur-[120px] pointer-events-none"></div>

    <!-- Header -->
    <header class="py-3 px-8 border-b border-white/5 bg-[#12141a]/80 backdrop-blur-md sticky top-0 z-50 flex items-center justify-between shrink-0">
        <div>
            <h1 class="text-2xl font-bold tracking-tight text-transparent bg-clip-text bg-gradient-to-r from-blue-400 via-indigo-400 to-emerald-400 flex items-center gap-2">
                <svg class="w-6 h-6 text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"></path></svg>
                VidScrutiny
            </h1>
            <p class="text-gray-400 text-[11px] mt-0.5 font-medium tracking-widest uppercase">Real-time Information Nutrition Label</p>
        </div>
        <div class="hidden sm:flex items-center gap-4 text-sm font-medium text-gray-400">
            <span class="flex items-center gap-1.5 px-3 py-1 bg-white/5 rounded-full"><div class="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></div> Llama-3 Active</span>
            <span class="flex items-center gap-1.5 px-3 py-1 bg-white/5 rounded-full"><div class="w-2 h-2 rounded-full bg-blue-500 animate-pulse"></div> RAG Connected</span>
            <a href="https://github.com/AyushPathak4650/VidScrutiny" target="_blank" class="flex items-center gap-2 ml-2 px-3 py-1.5 bg-[#1a1d24] hover:bg-gray-700 text-gray-300 hover:text-white border border-gray-600 rounded-lg transition-colors">
                <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path fill-rule="evenodd" clip-rule="evenodd" d="M12 2C6.477 2 2 6.484 2 12.017c0 4.425 2.865 8.18 6.839 9.504.5.092.682-.217.682-.483 0-.237-.008-.868-.013-1.703-2.782.605-3.369-1.343-3.369-1.343-.454-1.158-1.11-1.466-1.11-1.466-.908-.62.069-.608.069-.608 1.003.07 1.531 1.032 1.531 1.032.892 1.53 2.341 1.088 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.113-4.555-4.951 0-1.093.39-1.988 1.029-2.688-.103-.253-.446-1.272.098-2.65 0 0 .84-.27 2.75 1.026A9.564 9.564 0 0112 6.844c.85.004 1.705.115 2.504.337 1.909-1.296 2.747-1.027 2.747-1.027.546 1.379.202 2.398.1 2.651.64.7 1.028 1.595 1.028 2.688 0 3.848-2.339 4.695-4.566 4.943.359.309.678.92.678 1.855 0 1.338-.012 2.419-.012 2.747 0 .268.18.58.688.482A10.019 100.019 0 0022 12.017C22 6.484 17.522 2 12 2z"></path></svg>
                Star on GitHub
            </a>
        </div>
    </header>

    <main class="flex-grow flex flex-col pt-6 pb-6 px-6 w-full max-w-[1500px] mx-auto relative z-10 min-h-0">
        
        <!-- Input Area -->
        <div class="w-full mb-4 shrink-0 bg-[#16181f]/80 backdrop-blur-sm p-1.5 rounded-2xl shadow-2xl border border-white/10 flex gap-2 transition-all focus-within:border-blue-500/50 focus-within:ring-4 focus-within:ring-blue-500/10">
            <div class="flex-grow relative flex items-center">
                <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                    <svg class="w-5 h-5 text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.828 10.172a4 4 0 00-5.656 0l-4 4a4 4 0 105.656 5.656l1.102-1.101m-.758-4.899a4 4 0 005.656 0l4-4a4 4 0 00-5.656-5.656l-1.1 1.1"></path></svg>
                </div>
                <input type="url" id="video-url" class="w-full bg-transparent border-none px-4 pl-12 py-3 text-gray-100 placeholder-gray-500 focus:outline-none focus:ring-0 text-base font-medium" placeholder="Paste YouTube, TikTok, or direct .mp4 URL..." value="https://ia800300.us.archive.org/31/items/jfk_moon_speech_rice_university/jfk_moon_speech_rice_university_512kb.mp4">
            </div>
            
            <select id="language-select" class="bg-[#0a0b0e] text-gray-300 border border-gray-700 rounded-xl px-4 py-3 focus:outline-none focus:border-blue-500 font-medium cursor-pointer">
                <option value="Auto">Auto (Original)</option>
                <option value="Hindi">Hindi (हिंदी)</option>
                <option value="English">English</option>
            </select>

            <button id="analyze-btn" class="bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-500 hover:to-indigo-500 text-white font-bold py-3 px-8 rounded-xl transition-all duration-200 shadow-lg shadow-blue-900/30 active:scale-95 flex items-center gap-2">
                <span>Analyze AI</span>
            </button>
        </div>

        <!-- Sleek Status Indicator -->
        <div id="status-container" class="hidden shrink-0 w-full mb-4 flex items-center justify-center gap-3 text-sm font-semibold bg-blue-500/10 border border-blue-500/20 py-2.5 rounded-lg backdrop-blur-sm">
            <div class="w-4 h-4 border-2 border-blue-400 border-t-transparent rounded-full animate-spin"></div>
            <span id="status-text" class="text-blue-300 tracking-wide">Connecting to AI Pipeline...</span>
        </div>

        <!-- Main Layout Split -->
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6 flex-grow min-h-0 h-full">
            
            <!-- Left Side: Video Player (Takes 2/3 space) -->
            <div class="lg:col-span-2 flex flex-col h-full min-h-0">
                <div class="relative w-full h-full bg-[#0a0b0e] rounded-2xl overflow-hidden video-container group border border-white/5 flex items-center justify-center">
            
            <video id="main-video" class="w-full h-full object-contain" crossorigin="anonymous">
                <!-- Video source injected dynamically -->
            </video>

            <!-- Playback Initial Overlay -->
            <div id="initial-play-overlay" class="absolute inset-0 flex items-center justify-center bg-black/40 hidden">
                <button id="big-play-btn" class="w-20 h-20 bg-blue-600/90 hover:bg-blue-500 rounded-full flex items-center justify-center text-white backdrop-blur-md transition-transform hover:scale-110 active:scale-95 shadow-2xl">
                    <svg class="w-10 h-10 ml-1" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM9.555 7.168A1 1 0 008 8v4a1 1 0 001.555.832l3-2a1 1 0 000-1.664l-3-2z" clip-rule="evenodd"></path></svg>
                </button>
            </div>

            <!-- "Community Notes" Sleek Overlay Card (Positioned bottom-left for broadcast feel) -->
            <div id="fact-card-overlay" class="absolute inset-0 pointer-events-none flex items-end justify-start p-6 sm:p-10 z-30">
                <!-- 30% Surface Color: Fact Card -->
                <div id="fact-card" class="bg-[#1e232d]/95 backdrop-blur-xl border-l-4 border-slate-700 p-6 rounded-r-xl rounded-bl-sm shadow-[0_20px_50px_rgba(0,0,0,0.5)] max-w-md w-full relative overflow-hidden">
                    <!-- Decorative subtle glow in the background of the card -->
                    <div id="card-glow" class="absolute -top-10 -right-10 w-32 h-32 bg-blue-500/10 rounded-full blur-3xl"></div>
                    
                    <div class="relative z-10">
                        <div class="flex items-center justify-between mb-4">
                            <div class="flex items-center gap-3">
                                <div id="rating-badge" class="px-3 py-1 rounded-md text-xs font-bold tracking-widest uppercase shadow-sm"></div>
                                <span class="text-gray-400 text-sm font-mono bg-black/20 px-2 py-0.5 rounded" id="timestamp-display"></span>
                            </div>
                            <button id="dismiss-card-btn" class="text-gray-500 hover:text-white transition-colors pointer-events-auto p-1">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                            </button>
                        </div>
                        
                        <div class="mb-4 stagger-1">
                            <p class="text-[10px] text-gray-500 uppercase tracking-widest mb-1 font-semibold">Claim</p>
                            <p id="claim-text" class="text-base text-gray-300 font-medium leading-snug border-l-2 border-gray-700 pl-3 italic">"..."</p>
                        </div>
                        
                        <div class="mb-5 stagger-2">
                            <p class="text-[10px] text-gray-500 uppercase tracking-widest mb-1 font-semibold">Verified Fact</p>
                            <p id="explanation-text" class="text-white text-[15px] leading-relaxed custom-scrollbar max-h-32 overflow-y-auto pr-2">...</p>
                        </div>
                        
                        <div class="pt-3 border-t border-white/10 stagger-3">
                            <a id="source-link" href="#" target="_blank" class="pointer-events-auto inline-flex items-center gap-1.5 text-blue-400 hover:text-blue-300 text-sm font-medium transition-colors group">
                                <svg class="w-4 h-4 text-blue-500 group-hover:text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.828 10.172a4 4 0 00-5.656 0l-4 4a4 4 0 105.656 5.656l1.102-1.101m-.758-4.899a4 4 0 005.656 0l4-4a4 4 0 00-5.656-5.656l-1.1 1.1"></path></svg>
                                Read Source
                                <svg class="w-3 h-3 ml-1 opacity-0 group-hover:opacity-100 transition-opacity transform group-hover:translate-x-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
                            </a>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Custom Controls (Gradient background for visibility) -->
            <div class="absolute bottom-0 left-0 right-0 px-6 pb-6 pt-16 bg-gradient-to-t from-black via-black/80 to-transparent opacity-0 group-hover:opacity-100 transition-opacity duration-300 z-40">
                
                <!-- Timeline Scrubber -->
                <div class="relative w-full h-1.5 bg-gray-700/80 rounded-full mb-5 cursor-pointer group/timeline hover:h-2 transition-all duration-200" id="timeline">
                    <!-- The 10% High-Contrast Accent: Progress Bar -->
                    <div id="progress-bar" class="absolute top-0 left-0 h-full bg-blue-500 rounded-full pointer-events-none w-0 shadow-[0_0_10px_rgba(59,130,246,0.5)] transition-all duration-75"></div>
                    <!-- Markers Container -->
                    <div id="markers-container" class="absolute inset-0 pointer-events-none"></div>
                </div>
                
                <div class="flex items-center justify-between">
                    <div class="flex items-center gap-6">
                        <button id="play-pause-btn" class="text-white hover:text-blue-400 transition-colors focus:outline-none focus:ring-2 focus:ring-blue-500/50 rounded-full p-1">
                            <svg id="play-icon" class="w-7 h-7" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM9.555 7.168A1 1 0 008 8v4a1 1 0 001.555.832l3-2a1 1 0 000-1.664l-3-2z" clip-rule="evenodd"></path></svg>
                            <svg id="pause-icon" class="w-7 h-7 hidden" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zM7 8a1 1 0 012 0v4a1 1 0 11-2 0V8zm5-1a1 1 0 00-1 1v4a1 1 0 102 0V8a1 1 0 00-1-1z" clip-rule="evenodd"></path></svg>
                        </button>
                        <div class="text-xs font-mono text-gray-300 tracking-wider" id="time-display">0:00 / 0:00</div>
                    </div>
                    
                    <!-- Volume/Fullscreen placeholders for UI completeness -->
                    <div class="flex items-center gap-4 text-gray-400">
                        <svg class="w-5 h-5 hover:text-white cursor-pointer transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.536 8.464a5 5 0 010 7.072M18.364 5.636a9 9 0 010 12.728M8 12H5a2 2 0 01-2-2V8a2 2 0 012-2h3l4-4v16l-4-4z"></path></svg>
                        <svg class="w-5 h-5 hover:text-white cursor-pointer transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 8V4m0 0h4M4 4l5 5m11-1V4m0 0h-4m4 0l-5 5M4 16v4m0 0h4m-4 0l5-5m11 5l-5-5m5 5v-4m0 4h-4"></path></svg>
                    </div>
                </div>
            </div>
        </div> <!-- End of relative video container -->
        </div> <!-- End of Left Side Column -->
            
            <!-- Right Side: Live Log & Features (Takes 1/3 space) -->
            <div class="lg:col-span-1 flex flex-col h-full min-h-0">
                <div class="bg-[#16181f]/80 backdrop-blur-md rounded-2xl border border-white/5 shadow-2xl flex flex-col h-full overflow-hidden">
                    <div class="p-4 border-b border-white/5 flex items-center justify-between bg-black/20 shrink-0">
                        <h2 class="font-bold text-gray-200 tracking-wide flex items-center gap-2">
                            <svg class="w-4 h-4 text-emerald-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-3 7h3m-3 4h3m-6-4h.01M9 16h.01"></path></svg>
                            Analysis Log
                        </h2>
                        <span id="claim-count" class="text-xs bg-white/10 px-2 py-1 rounded text-gray-400 font-mono">0 Claims</span>
                    </div>
                    
                    <div id="side-log" class="flex-grow overflow-y-auto custom-scrollbar p-4 flex flex-col gap-3">
                        <!-- Empty State -->
                        <div id="side-log-empty" class="h-full flex flex-col items-center justify-center text-center px-4 opacity-50">
                            <svg class="w-12 h-12 mb-3 text-gray-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 002-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"></path></svg>
                            <p class="text-sm text-gray-400">Awaiting video analysis. Paste a link to generate a real-time fact check log.</p>
                        </div>
                        <!-- Log items will be injected here -->
                    </div>
                </div>
            </div>

        </div>
    </main>

    <script src="app.js"></script>
</body>
</html>
